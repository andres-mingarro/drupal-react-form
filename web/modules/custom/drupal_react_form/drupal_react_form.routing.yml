drupal_react_form.admin_list:
  path: '/admin/drupal-react-form/forms'
  defaults:
    _controller: '\Drupal\drupal_react_form\Controller\DynamicFormAdminController::listForms'
    _title: 'Formularios React'
  requirements:
    _permission: 'administer drupal react forms'

drupal_react_form.admin_add:
  path: '/admin/drupal-react-form/forms/add'
  defaults:
    _form: '\Drupal\drupal_react_form\Form\DynamicFormEditForm'
    _title: 'Agregar formulario'
  requirements:
    _permission: 'administer drupal react forms'

drupal_react_form.admin_edit:
  path: '/admin/drupal-react-form/forms/{form_id}/edit'
  defaults:
    _form: '\Drupal\drupal_react_form\Form\DynamicFormEditForm'
    _title: 'Editar formulario'
  requirements:
    _permission: 'administer drupal react forms'

drupal_react_form.admin_delete:
  path: '/admin/drupal-react-form/forms/{form_id}/delete'
  defaults:
    _controller: '\Drupal\drupal_react_form\Controller\DynamicFormAdminController::deleteForm'
    _title: 'Eliminar formulario'
  requirements:
    _permission: 'administer drupal react forms'
    _csrf_token: 'TRUE'

drupal_react_form.dynamic_get:
  path: '/api/react-form/dynamic/{form_id}'
  defaults:
    _controller: '\Drupal\drupal_react_form\Controller\DynamicFormApiController::getDefinition'
    _title: 'Dynamic Form Definition'
  requirements:
    _permission: 'access content'
    _format: 'json'
  methods: [GET]

drupal_react_form.dynamic_submissions:
  path: '/api/react-form/dynamic/{form_id}/submissions'
  defaults:
    _controller: '\Drupal\drupal_react_form\Controller\DynamicFormApiController::getSubmissions'
    _title: 'Dynamic Form Submissions'
  requirements:
    _permission: 'access content'
    _format: 'json'
  methods: [GET]

drupal_react_form.dynamic_submit:
  path: '/api/react-form/dynamic/{form_id}/submit'
  defaults:
    _controller: '\Drupal\drupal_react_form\Controller\DynamicFormApiController::submitForm'
    _title: 'Dynamic Form Submit'
  requirements:
    _permission: 'access content'
    _csrf_request_header_token: 'TRUE'
    _format: 'json'
  methods: [POST]

drupal_react_form.user_edit_page:
  path: '/drupal-react-form/user/{uid}/edit'
  defaults:
    _controller: '\Drupal\drupal_react_form\Controller\UserReactFormController::demoPage'
    _title: 'Editar perfil'
  requirements:
    _permission: 'access content'
    uid: '\d+'

drupal_react_form.user_get_definition:
  path: '/api/react-form/user/{uid}'
  defaults:
    _controller: '\Drupal\drupal_react_form\Controller\UserReactFormController::getDefinition'
    _title: 'User Form Definition'
  requirements:
    _permission: 'access content'
    _format: 'json'
    uid: '\d+'
  methods: [GET]

drupal_react_form.user_upload_picture:
  path: '/api/react-form/user/{uid}/upload/picture'
  defaults:
    _controller: '\Drupal\drupal_react_form\Controller\UserReactFormController::uploadPicture'
    _title: 'Upload User Picture'
  requirements:
    _permission: 'access content'
    _csrf_request_header_token: 'TRUE'
    uid: '\d+'
  methods: [POST]

drupal_react_form.user_submit_form:
  path: '/api/react-form/user/{uid}/submit'
  defaults:
    _controller: '\Drupal\drupal_react_form\Controller\UserReactFormController::submitForm'
    _title: 'User Form Submit'
  requirements:
    _permission: 'access content'
    _csrf_request_header_token: 'TRUE'
    _format: 'json'
    uid: '\d+'
  methods: [POST]

drupal_react_form.demo_page:
  path: '/drupal-react-form/demo'
  defaults:
    _controller: '\Drupal\drupal_react_form\Controller\ReactFormController::demoPage'
    _title: 'Demo — React Form Components'
  requirements:
    _permission: 'access content'

drupal_react_form.get_definition:
  path: '/api/react-form/{form_id}'
  defaults:
    _controller: '\Drupal\drupal_react_form\Controller\ReactFormController::getDefinition'
    _title: 'React Form Definition'
  requirements:
    _permission: 'access content'
    _format: 'json'
  methods: [GET]

drupal_react_form.submit_form:
  path: '/api/react-form/{form_id}/submit'
  defaults:
    _controller: '\Drupal\drupal_react_form\Controller\ReactFormController::submitForm'
    _title: 'React Form Submit'
  requirements:
    _permission: 'access content'
    _csrf_request_header_token: 'TRUE'
    _format: 'json'
  methods: [POST]
